name: Supabase Weekly Backup to R2

on:
  schedule:
    # Run every Sunday at 03:00 UTC
    - cron: '0 3 * * 0'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backup-database:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          pip install boto3 python-dotenv

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.39.2

      - name: Check Supabase CLI Version
        run: |
          supabase --version
          supabase link --help

      - name: Dump Supabase Database & Upload to R2
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          CF_R2_PRIVATE_BUCKET: ${{ secrets.CF_R2_PRIVATE_BUCKET }}
          CF_R2_PRIVATE_ACCESS_KEY_ID: ${{ secrets.CF_R2_PRIVATE_ACCESS_KEY_ID }}
          CF_R2_PRIVATE_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_PRIVATE_SECRET_ACCESS_KEY }}
          CF_R2_PRIVATE_ENDPOINT: ${{ secrets.CF_R2_PRIVATE_ENDPOINT }}
          PYTHONPATH: backend
        run: |
          # Sanitize secrets to remove tabs, quotes, or invisible characters pasted into GitHub Secrets
          CLEAN_PROJECT_ID=$(echo -n "$SUPABASE_PROJECT_ID" | tr -cd 'a-zA-Z0-9')
          CLEAN_DB_PASSWORD=$(echo -n "$SUPABASE_DB_PASSWORD" | tr -d '\r\n\t ' | sed -e 's/^["\x27]//' -e 's/["\x27]$//')
          CLEAN_ACCESS_TOKEN=$(echo -n "$SUPABASE_ACCESS_TOKEN" | tr -d '\r\n\t ' | sed -e 's/^["\x27]//' -e 's/["\x27]$//')
          export SUPABASE_ACCESS_TOKEN="$CLEAN_ACCESS_TOKEN"

          echo "Sanitized Project ID length: ${#CLEAN_PROJECT_ID}"
          echo "Sanitized DB Password length: ${#CLEAN_DB_PASSWORD}"

          if [ -z "$CLEAN_PROJECT_ID" ] || [ -z "$CLEAN_DB_PASSWORD" ]; then
            echo "Supabase project credentials not configured. Skipping backup."
            exit 0
          fi

          echo "Linking database project ${CLEAN_PROJECT_ID}..."
          supabase link \
            --project-ref "$CLEAN_PROJECT_ID" \
            --password "$CLEAN_DB_PASSWORD" \
            --debug

          # Force major_version = 17 to match remote Postgres 17.6 server and prevent pg_dump version mismatch errors

          echo "Dumping database schema and data..."
          supabase db dump \
            --linked \
            --password "$CLEAN_DB_PASSWORD" \
            -f backup.sql \
            --debug

          gzip -f backup.sql
          echo "Uploading backup.sql.gz to Cloudflare R2..."
          python backend/scripts/backup_supabase_to_r2.py backup.sql.gz
